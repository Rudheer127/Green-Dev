        - heading "Green code is good code." [level=2] [ref=e78]:
          - text: Green code is
          - text: good code.
        - paragraph [ref=e79]: The cloud is physical infrastructure that consumes real electricity. Every architectural choice a developer makes — which compute service, which region, how often CI runs — has a direct energy cost. Most developers never see that number. We think they should.
      - generic [ref=e80]:
        - heading "The numbers that matter" [level=3] [ref=e81]
        - generic [ref=e82]:
          - generic [ref=e83]:
            - generic [ref=e84]:
              - paragraph [ref=e85]: ~1%
              - paragraph [ref=e86]: of global electricity
            - paragraph [ref=e88]: Data centres consume roughly 1% of global electricity — a share that grows every year as cloud adoption accelerates. The software choices developers make today determine the hardware utilisation of tomorrow.
          - generic [ref=e89]:
            - generic [ref=e90]:
              - paragraph [ref=e91]: 40%
              - paragraph [ref=e92]: CI energy wasted
            - paragraph [ref=e94]: Studies show that 40% of CI compute time is spent re-downloading dependencies that haven't changed. A single actions/cache step eliminates that — for every project, on every run, forever.
          - generic [ref=e95]:
            - generic [ref=e96]:
              - paragraph [ref=e97]: 14×
              - paragraph [ref=e98]: idle VM waste
            - paragraph [ref=e100]: An always-on EC2 instance runs 720 hours per month. A student project is actually used roughly 50 of those hours. The other 670 hours burn electricity for nothing. Serverless scales to zero.
          - generic [ref=e101]:
            - generic [ref=e102]:
              - paragraph [ref=e103]: 95%
              - paragraph [ref=e104]: renewable in us-west-2
            - paragraph [ref=e106]: AWS Oregon (us-west-2) runs on more than 95% renewable energy. Moving a workload from ap-southeast-1 to us-west-2 can cut its effective carbon intensity by 40% with a single config change.
          - generic [ref=e107]:
            - generic [ref=e108]:
              - paragraph [ref=e109]: 50 MB
              - paragraph [ref=e110]: vs 1.1 GB Docker image
            - paragraph [ref=e112]: node:20-alpine is 50 MB. node:latest is 1.1 GB. Every CI pull, every container start moves that delta across the wire. Alpine is not a trade-off — it's strictly better.
      - generic [ref=e113]:
        - heading "Our Principles" [level=3] [ref=e114]
        - generic [ref=e115]:
          - generic [ref=e116]:
            - heading "Visibility first" [level=4] [ref=e117]
            - paragraph [ref=e118]: You cannot improve what you cannot measure. Most developers have no idea how many compute hours their project wastes per month, what that costs, or what it emits. GreenDev Coach makes that number concrete and personal.
          - generic [ref=e119]:
            - heading "Green is good engineering" [level=4] [ref=e120]
            - paragraph [ref=e121]: Every green practice we recommend is also a performance or cost win. Alpine images build faster. Caching reduces pipeline time. Serverless eliminates idle spend. Sustainability and quality are the same thing.
          - generic [ref=e122]:
            - heading "Student devs are the leverage point" [level=4] [ref=e123]
            - paragraph [ref=e124]: The habits a developer forms in university follow them to every startup, every enterprise, every cloud bill they'll ever write. Teaching green patterns early creates a compounding effect at industry scale.
          - generic [ref=e125]:
            - heading "Specific, not preachy" [level=4] [ref=e126]
            - paragraph [ref=e127]: We don't show a generic "be sustainable" message. We show your repo, your CI triggers, your Docker base image, your region — and exactly what to change, with the YAML to paste directly into your workflow.
